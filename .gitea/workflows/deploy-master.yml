name: Deploy Klotus Landing Page API Production
on:
  push:
    branches: [ master ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
      - name: Deploy API on Head
        run: |
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no lio@100.75.67.115 '
            set -e
            cd /opt/repos/klotus/landing-page-api
            git remote set-url origin https://lio.nguyen:${{ secrets.GIT_TOKEN }}@git.liouni.com/klotus/landing-page-api.git
            git fetch origin
            git checkout master
            git reset --hard origin/master
            cd /opt/stacks/klotus-landing-page-api
            docker compose up -d --build --force-recreate
            for i in $(seq 1 30); do
              code=$(docker exec klotus-landing-page-api sh -lc "wget -qO- http://127.0.0.1:10000/api/v1 >/dev/null 2>&1; echo $?" || true)
              if [ "$code" = "0" ]; then
                echo "API health OK (container localhost /api/v1)"
                exit 0
              fi
              sleep 2
            done
            echo "API health check failed"
            exit 1
          '
